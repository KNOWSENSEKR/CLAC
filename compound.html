<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>복리 계산기 | 노센스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0c0c10;
  --s1:#141418;
  --s2:#1c1c23;
  --s3:#242430;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#eeeef0;
  --muted:#666672;
  --muted2:#999aaa;
  --accent:#00e5a0;
  --accent-dim:rgba(0,229,160,0.1);
  --accent-border:rgba(0,229,160,0.25);
  --blue:#5b9cf6;
  --blue-dim:rgba(91,156,246,0.1);
}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:2rem 1.25rem 4rem;
}

.page{max-width:660px;margin:0 auto;}

/* ── 채널 헤더 ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2.5rem;padding-bottom:1.25rem;
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{
  width:42px;height:42px;border-radius:10px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:700;color:#0c0c10;
  letter-spacing:-0.5px;flex-shrink:0;
}
.brand-name{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.yt-btn{
  display:flex;align-items:center;gap:6px;
  background:#ff0000;color:#fff;
  font-size:11px;font-weight:700;
  padding:6px 12px;border-radius:6px;
  text-decoration:none;letter-spacing:0.3px;
  white-space:nowrap;
}
.yt-btn svg{width:13px;height:13px;fill:#fff;}

/* ── 히어로 ── */
.hero{margin-bottom:2rem;}
.hero-tag{
  display:inline-block;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);
  border-radius:4px;padding:3px 8px;margin-bottom:10px;
}
.hero-title{
  font-size:30px;font-weight:900;line-height:1.15;letter-spacing:-0.5px;
}
.hero-title em{color:var(--accent);font-style:normal;}
.hero-desc{font-size:13px;color:var(--muted2);margin-top:8px;line-height:1.7;}

/* ── 지표 카드 ── */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
.card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;padding:14px;
}
.card-label{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:0.3px;}
.card-value{font-size:18px;font-weight:700;line-height:1;}
.card-value.g{color:var(--accent);}
.card-value.b{color:var(--blue);}

/* ── 슬라이더 컨트롤 ── */
.controls{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem;}
.ctrl{
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;
  display:flex;align-items:center;gap:12px;
}
.ctrl-label{font-size:12px;color:var(--muted);min-width:72px;}
.ctrl-out{
  font-size:13px;font-weight:700;min-width:86px;
  text-align:right;color:var(--accent);
  font-family:'Space Grotesk',sans-serif;
}
input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;border-radius:3px;
  background:var(--s3);cursor:pointer;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--accent);cursor:pointer;
  border:2px solid var(--bg);
  box-shadow:0 0 0 3px var(--accent-dim);
}

/* ── 차트 ── */
.chart-section{margin-bottom:1.5rem;}
.legend{display:flex;gap:14px;margin-bottom:10px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-sq{width:10px;height:10px;border-radius:2px;}
.chart-wrap{position:relative;width:100%;height:250px;}

/* ── 인사이트 ── */
.insight{
  background:var(--accent-dim);border:1px solid var(--accent-border);
  border-radius:12px;padding:14px 16px;
  font-size:13px;color:rgba(200,255,235,0.85);line-height:1.7;
  margin-bottom:2rem;
}
.insight b{color:var(--accent);}

/* ── 공유/액션 ── */
.share-section{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:1.25rem;margin-bottom:2rem;
}
.share-title{
  font-size:12px;font-weight:700;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;
}
.share-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.share-btn{
  display:flex;align-items:center;gap:7px;
  border:1px solid var(--border2);border-radius:8px;
  background:var(--s2);color:var(--text);
  font-size:12px;font-weight:600;padding:8px 14px;
  cursor:pointer;text-decoration:none;
  transition:background 0.15s,border-color 0.15s;
  font-family:'Noto Sans KR',sans-serif;
}
.share-btn:hover{background:var(--s3);border-color:rgba(255,255,255,0.2);}
.share-btn svg{width:14px;height:14px;flex-shrink:0;}
.share-btn.kakao{color:#1a1a1a;background:#FEE500;border-color:#FEE500;}
.share-btn.kakao:hover{background:#f5db00;border-color:#f5db00;}
.url-copy{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;margin-top:10px;flex:1;
  cursor:pointer;
}
.url-text{
  flex:1;font-size:11px;color:var(--muted2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'Space Grotesk',sans-serif;
}
.copy-label{
  font-size:11px;font-weight:700;color:var(--accent);
  white-space:nowrap;
}

/* ── QR ── */
.qr-section{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:1.25rem;
  display:flex;align-items:center;gap:1.25rem;
}
.qr-box{
  width:96px;height:96px;flex-shrink:0;
  background:#fff;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#qrcode canvas,#qrcode img{width:88px!important;height:88px!important;}
.qr-info{}
.qr-eyebrow{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.qr-headline{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:6px;}
.qr-desc{font-size:12px;color:var(--muted2);line-height:1.6;}

/* ── 푸터 ── */
.footer{
  text-align:center;margin-top:2.5rem;padding-top:1.5rem;
  border-top:1px solid var(--border);
  font-size:11px;color:var(--muted);
}
.footer b{color:var(--accent);}

@media(max-width:480px){
  .cards{grid-template-columns:1fr 1fr;}
  .cards .card:last-child{grid-column:span 2;}
  .hero-title{font-size:24px;}
  .qr-section{flex-direction:column;text-align:center;}
}
</style>
</head>
<body>
<div class="page">

  <!-- 채널 헤더 -->
  <header class="header">
    <div class="brand">
      <div class="brand-logo">NS</div>
      <div>
        <div class="brand-name">노센스</div>
        <div class="brand-sub">경제·투자 인사이트</div>
      </div>
    </div>
    <a class="yt-btn" href="https://www.youtube.com/@KnowSense_KR" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#0c0c10"/></svg>
      구독하기
    </a>
  </header>

  <!-- 히어로 -->
  <div class="hero">
    <div class="hero-tag">인터랙티브 계산기</div>
    <h1 class="hero-title">복리가 만드는<br><em>눈덩이 효과</em></h1>
    <p class="hero-desc">슬라이더를 움직여 직접 확인하세요. 단리와 복리의 차이가 시간이 지날수록 얼마나 벌어지는지.</p>
  </div>

  <!-- 지표 카드 -->
  <div class="cards">
    <div class="card">
      <div class="card-label">초기 투자금</div>
      <div class="card-value" id="card-p">₩1,000,000</div>
    </div>
    <div class="card">
      <div class="card-label">최종 금액 (복리)</div>
      <div class="card-value g" id="card-f">—</div>
    </div>
    <div class="card">
      <div class="card-label">총 이자 수익</div>
      <div class="card-value b" id="card-g">—</div>
    </div>
  </div>

  <!-- 슬라이더 -->
  <div class="controls">
    <div class="ctrl">
      <span class="ctrl-label">초기 투자금</span>
      <input type="range" min="1000000" max="100000000" step="1000000" value="50000000" id="r-p" oninput="calc()">
      <span class="ctrl-out" id="o-p">₩1,000,000</span>
    </div>
    <div class="ctrl">
      <span class="ctrl-label">연 이자율</span>
      <input type="range" min="1" max="20" step="0.5" value="7" id="r-r" oninput="calc()">
      <span class="ctrl-out" id="o-r">7.0%</span>
    </div>
    <div class="ctrl">
      <span class="ctrl-label">투자 기간</span>
      <input type="range" min="1" max="40" step="1" value="20" id="r-y" oninput="calc()">
      <span class="ctrl-out" id="o-y">20년</span>
    </div>
  </div>

  <!-- 차트 -->
  <div class="chart-section">
    <div class="legend">
      <div class="leg"><span class="leg-sq" style="background:#00e5a0"></span>복리</div>
      <div class="leg"><span class="leg-sq" style="background:#5b9cf6"></span>단리</div>
      <div class="leg"><span class="leg-sq" style="background:#333340"></span>원금</div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <!-- 인사이트 -->
  <div class="insight" id="insight"></div>

  <div class="footer">
    <b>노센스</b> · 경제·투자 인사이트 유튜브 채널
  </div>
</div>

<script>
let myChart;

function fmt(n){
  return '₩'+Math.round(n).toLocaleString('ko-KR');
}

function calc(){
  const p = +document.getElementById('r-p').value;
  const r = +document.getElementById('r-r').value/100;
  const y = +document.getElementById('r-y').value;
  const rStr = (+document.getElementById('r-r').value).toFixed(1);

  document.getElementById('o-p').textContent = fmt(p);
  document.getElementById('o-r').textContent = rStr+'%';
  document.getElementById('o-y').textContent = y+'년';
  document.getElementById('card-p').textContent = fmt(p);

  const labels=[],comp=[],simp=[],flat=[];
  for(let i=0;i<=y;i++){
    labels.push(i+'년');
    comp.push(Math.round(p*Math.pow(1+r,i)));
    simp.push(Math.round(p*(1+r*i)));
    flat.push(p);
  }

  const fc=comp[y], fs=simp[y];
  document.getElementById('card-f').textContent = fmt(fc);
  document.getElementById('card-g').textContent = fmt(fc-p);

  const diff = fc-fs;
  document.getElementById('insight').innerHTML =
    `${y}년 후, 복리 <b>${fmt(fc)}</b> vs 단리 <b>${fmt(fs)}</b> — 복리가 <b>${fmt(diff)}</b> 더 많습니다. 이자에 이자가 붙는 눈덩이 효과, 시작이 빠를수록 더 큰 차이를 만듭니다.`;

  if(myChart) myChart.destroy();
  myChart = new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'복리',data:comp,borderColor:'#00e5a0',backgroundColor:'rgba(0,229,160,0.07)',fill:true,tension:0.35,pointRadius:0,borderWidth:2.5},
        {label:'단리',data:simp,borderColor:'#5b9cf6',backgroundColor:'rgba(91,156,246,0.05)',fill:true,tension:0.1,pointRadius:0,borderWidth:2},
        {label:'원금',data:flat,borderColor:'#333340',borderDash:[5,4],fill:false,tension:0,pointRadius:0,borderWidth:1.5}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1c1c23',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleColor:'#eeeef0',bodyColor:'#999aaa',
          callbacks:{label:ctx=>' '+ctx.dataset.label+': ₩'+ctx.parsed.y.toLocaleString('ko-KR')}
        }
      },
      scales:{
        x:{ticks:{autoSkip:true,maxTicksLimit:10,font:{size:11},color:'#666672'},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}},
        y:{ticks:{callback:v=>v>=1000000?'₩'+(v/1000000).toFixed(0)+'M':'₩'+(v/10000).toFixed(0)+'만',font:{size:11},color:'#666672'},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });
}

/* ── 공유 함수 ── */
function getURL(){ return location.href; }

function shareKakao(){
  alert('Kakao SDK 연동 후 사용 가능합니다.\n링크: '+getURL());
}
function shareTwitter(){
  const msg = encodeURIComponent('복리 계산기로 직접 확인해보세요! | 노센스');
  window.open('https://twitter.com/intent/tweet?text='+msg+'&url='+encodeURIComponent(getURL()),'_blank');
}
function shareLink(){
  navigator.clipboard.writeText(getURL()).then(()=>{
    const btn = document.querySelector('.share-btn:last-child');
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 복사됨!';
    btn.style.color='#00e5a0';btn.style.borderColor='rgba(0,229,160,0.35)';
    setTimeout(()=>{btn.innerHTML=orig;btn.style.color='';btn.style.borderColor='';},1800);
  });
}

/* ── QR 코드 ── */
window.addEventListener('load',()=>{
  calc();
  new QRCode(document.getElementById('qrcode'),{
    text: location.href || 'https://youtu.be/',
    width:88, height:88,
    colorDark:'#0c0c10', colorLight:'#ffffff',
    correctLevel:QRCode.CorrectLevel.M
  });
});
</script>
</body>
</html>
